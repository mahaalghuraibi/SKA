# Render Blueprint — adjust service name / region / plan as needed.
# Docs: https://render.com/docs/blueprint-spec
#
# Set DATABASE_URL, SECRET_KEY, CORS_ALLOW_ORIGINS, SEED_ADMIN_EMAIL, SEED_ADMIN_PASSWORD,
# and AI keys in the Render dashboard (Environment) or via `envVars` below (use secrets).

services:
  - type: web
    name: taeen-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port=$PORT
    preDeployCommand: python scripts/create_admin.py
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
